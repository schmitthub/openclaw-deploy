name: PR

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read
  security-events: write
  actions: read

jobs:
  security:
    name: Security
    uses: ./.github/workflows/security.yml
    secrets: inherit
